<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Placement Readiness Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: "hsl(245, 58%, 51%)",
              ink: "#0f172a",
              surface: "#f8fafc",
              panel: "#ffffff",
              line: "#e2e8f0",
              muted: "#64748b",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              serif: ["Fraunces", "serif"],
            },
            boxShadow: {
              panel: "0 18px 40px rgba(15, 23, 42, 0.08)",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="bg-surface text-ink antialiased">
    <div id="root"></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
